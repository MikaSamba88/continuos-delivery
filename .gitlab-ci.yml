stages:
  - build
  - test

build api:
  stage: build
  image: docker:29
  before_script:
    - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
  script:
    - docker buildx build -t $CI_REGISTRY_IMAGE:latest --cache-from=$CI_REGISTRY_IMAGE:latest --push .
  rules:
    - changes:
      - Dockerfile
      - main.py
      - requirements.txt
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH 

test api:
  stage: test
  image: $CI_REGISTRY_IMAGE:latest
  # gitlab coverage report: https://docs.gitlab.com/ci/testing/code_coverage/
  script:
    - pytest --cov
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
